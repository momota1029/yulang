[package]
name = "yulang-lsp"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[[bin]]
name = "yulang-lsp"
path = "src/main.rs"

[dependencies]
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
yulang-editor = { path = "../yulang-editor" }
yulang-infer = { path = "../yulang-infer" }
yulang-source = { path = "../yulang-source" }
rowan = "0.15"
