[package]
name = "yulang-infer"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Type inference engine for Yulang, including Simple-Sub-style subtyping and row-like algebraic effect inference."

[dependencies]
smallvec = "1"
dashmap = "6"
rustc-hash = "2"
rowan = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
yulang-core-ir = { path = "../yulang-core-ir" }
yulang-parser = { path = "../yulang-parser" }
yulang-source = { path = "../yulang-source" }

[dev-dependencies]
