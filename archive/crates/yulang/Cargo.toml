[package]
name = "yulang"
version = "0.1.4"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Experimental language with Simple-Sub-style inference, algebraic effects, effect rows, roles, and Ruby/Perl/Raku-inspired syntax."
repository = "https://github.com/momota1029/yulang"
readme = "../../README.md"

[features]
default = ["server"]
server = ["dep:tower-lsp", "dep:tokio", "dep:yulang-editor"]

[dependencies]
yulang-typed-ir = { version = "0.1.3", path = "../yulang-typed-ir" }
yulang-runtime-lower = { version = "0.1.2", path = "../yulang-runtime-lower" }
yulang-elaborate = { version = "0.1.0", path = "../yulang-elaborate" }
yulang-monomorphize = { version = "0.1.1", path = "../yulang-monomorphize" }
yulang-runtime-ir = { version = "0.1.0", path = "../yulang-runtime-ir" }
yulang-runtime-refine = { version = "0.1.0", path = "../yulang-runtime-refine" }
yulang-runtime-types = { version = "0.1.0", path = "../yulang-runtime-types" }
yulang-vm = { version = "0.1.1", path = "../yulang-vm" }
yulang-parser = { version = "0.1.3", path = "../yulang-parser" }
yulang-infer = { version = "0.1.6", path = "../yulang-infer" }
yulang-sources = { version = "0.1.5", path = "../yulang-sources" }
yulang-editor = { version = "0.1.2", path = "../yulang-editor", optional = true }
chasa = "0.5.0"
clap = { version = "4", features = ["derive"] }
either = "1.13.0"
im = "15.1.0"
reborrow-generic = "0.1.2"
rowan = "0.15"
serde_json = "1"
tower-lsp = { version = "0.20", optional = true }
tokio = { version = "1", features = ["full"], optional = true }
unicode-ident = "1"

[target.'cfg(not(windows))'.dependencies]
pprof = { version = "0.14", features = ["flamegraph"] }
