[[case]]
name = "data_position_effect_function_public_signature"
file = "regressions/effect/data_position_effect_function_public_signature.yu"
kind = "public-signature"
std = "none"
symbol = "box.handle"
expect_type = "box('a & 'b, 'c) -> ('c -> ['b] 'c) -> ['b, 'a] ()"
