kind = "check"
std = "none"
expect_stderr = ""
expect_stdout_contains = [
  "error [yulang.type-mismatch]: x: type mismatch: bool is not int",
  "note: expected type comes from this type annotation: int",
  "note: actual type comes from this expression: bool",
]
contracts = ["diagnostics", "typechecker", "related-ranges"]

