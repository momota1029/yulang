<!doctype html>
<html lang="ja" data-lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yulang</title>
    <meta
      name="description"
      content="Yulang playground and documentation."
    />
  </head>
  <body>
    <main class="app">
      <header class="site-intro" aria-labelledby="site-title">
        <div class="site-copy i18n-block lang-ja">
          <p class="site-kicker">Playground + Docs</p>
          <h1 id="site-title">Yulang</h1>
          <p>Algebraic Effects を備えた関数型の核に、LL らしい軽い構文を。</p>
        </div>
        <div class="site-copy i18n-block lang-en" lang="en">
          <p class="site-kicker">Playground + Docs</p>
          <h1>Yulang</h1>
          <p>A functional core with algebraic effects, shaped by lightweight scripting syntax.</p>
        </div>
        <nav class="site-nav" aria-label="Primary">
          <a href="/ja/guide/" data-doc-link="guide">ガイド</a>
          <a href="/ja/reference/" data-doc-link="reference">リファレンス</a>
          <a
            href="https://github.com/momota1029/yulang"
            target="_blank"
            rel="noreferrer"
          >
            GitHub
          </a>
        </nav>
      </header>
      <section class="workspace" aria-label="Yulang playground">
        <div class="editor-pane">
          <div class="pane-head">
            <div class="pane-title">
              <h2>Playground</h2>
            </div>
            <div class="pane-actions">
              <div class="language-switch" aria-label="Language">
                <button
                  class="language-button"
                  type="button"
                  data-language-choice="ja"
                  lang="ja"
                >
                  日本語
                </button>
                <button
                  class="language-button"
                  type="button"
                  data-language-choice="en"
                  lang="en"
                >
                  English
                </button>
              </div>
              <button id="run-button" type="button" data-i18n="run">Run</button>
            </div>
          </div>
          <section class="examples-panel" aria-labelledby="examples-title">
            <div class="examples-head">
              <h2 id="examples-title" data-i18n="examples">Examples</h2>
            </div>
            <div id="example-buttons" class="example-buttons"></div>
          </section>
          <div class="editor-surface">
            <pre id="editor-highlight" aria-hidden="true"><code id="editor-highlight-content"></code></pre>
            <textarea
              id="source"
              spellcheck="false"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              wrap="off"
            ></textarea>
          </div>
        </div>
        <div class="side-pane">
          <section class="output-pane" aria-label="Result" data-i18n-aria="result">
            <h2 data-i18n="result">Result</h2>
            <pre id="result"></pre>
          </section>
          <section class="output-pane" aria-label="Type inference" data-i18n-aria="typesAria">
            <h2 data-i18n="types">Types</h2>
            <pre id="types"></pre>
          </section>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
